<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LabLivre — TV Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-1: #0a0e27;
  --bg-2: #1a1f3a;
  --green: #10f481;
  --red: #ff3859;
  --amber: #ffb800;
  --text: #ffffff;
  --text-dim: #8b95b8;
}
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%);
  color: var(--text);
  min-height: 100vh;
  padding: 3vh 4vw;
  overflow: hidden;
}
.container { max-width: 1800px; margin: 0 auto; height: 94vh; display: flex; flex-direction: column; }
header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4vh; }
h1 { font-family: 'Bebas Neue', sans-serif; font-size: 6vw; line-height: 0.9; letter-spacing: 0.02em; }
.subtitle { font-size: 1.5vw; color: var(--text-dim); margin-top: 0.5vw; font-weight: 500; }
.clock { font-family: 'Bebas Neue', sans-serif; font-size: 4vw; color: var(--text); letter-spacing: 0.05em; }
.date { font-size: 1.2vw; color: var(--text-dim); text-align: right; }
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3vw; flex: 1; align-items: center; }
.stat {
  background: rgba(255,255,255,0.05);
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 1.5vw;
  padding: 4vw 2vw;
  text-align: center;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
}
.stat::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 4px;
  background: var(--accent, var(--text-dim));
}
.stat.online::before { background: var(--green); }
.stat.offline::before { background: var(--red); }
.stat.total::before { background: var(--amber); }
.stat-label {
  font-size: 1.5vw;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-dim);
  margin-bottom: 1vw;
  font-weight: 700;
}
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14vw;
  line-height: 1;
  letter-spacing: -0.02em;
}
.stat.online .stat-num { color: var(--green); text-shadow: 0 0 60px rgba(16, 244, 129, 0.4); }
.stat.offline .stat-num { color: var(--red); text-shadow: 0 0 60px rgba(255, 56, 89, 0.4); }
.stat.total .stat-num { color: var(--text); }
.stat-sub { font-size: 1.2vw; color: var(--text-dim); margin-top: 1vw; font-weight: 500; }
.prova-banner {
  background: var(--red);
  color: white;
  padding: 1.5vw 3vw;
  border-radius: 1vw;
  font-size: 2.5vw;
  font-weight: 900;
  text-align: center;
  letter-spacing: 0.08em;
  margin: 2vh 0;
  animation: pulse-banner 2s infinite;
  box-shadow: 0 0 80px rgba(255, 56, 89, 0.5);
}
@keyframes pulse-banner {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}
footer { text-align: center; color: var(--text-dim); font-size: 1.1vw; margin-top: 2vh; font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.1em; }
.live-dot { display: inline-block; width: 0.8vw; height: 0.8vw; background: var(--green); border-radius: 50%; margin-right: 0.5vw; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1 id="lab-nome">LABLIVRE</h1>
      <div class="subtitle" id="lab-subtitle">Carregando…</div>
    </div>
    <div style="text-align:right;">
      <div class="clock" id="clock">--:--</div>
      <div class="date" id="date">—</div>
    </div>
  </header>

  <div id="prova-banner-container"></div>

  <div class="stats">
    <div class="stat total">
      <div class="stat-label">Total</div>
      <div class="stat-num" id="total">—</div>
      <div class="stat-sub">máquinas no laboratório</div>
    </div>
    <div class="stat online">
      <div class="stat-label">Online</div>
      <div class="stat-num" id="online">—</div>
      <div class="stat-sub" id="online-perc">— %</div>
    </div>
    <div class="stat offline">
      <div class="stat-label">Offline</div>
      <div class="stat-num" id="offline">—</div>
      <div class="stat-sub" id="offline-perc">— %</div>
    </div>
  </div>

  <footer><span class="live-dot"></span><span id="last-update">aguardando dados…</span></footer>
</div>

<script>
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute: '2-digit'});
  document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', {weekday: 'long', day: 'numeric', month: 'long'});
}
setInterval(updateClock, 1000); updateClock();

async function refresh() {
  try {
    const r = await fetch('api.json?t=' + Date.now());
    const d = await r.json();
    document.getElementById('lab-nome').textContent = d.lab.nome.toUpperCase();
    document.getElementById('lab-subtitle').textContent = `${d.rede.sub_rede || ''} · ${d.rede.interface || ''}`;
    document.getElementById('total').textContent = d.rede.total;
    document.getElementById('online').textContent = d.rede.online;
    document.getElementById('offline').textContent = d.rede.offline;
    const p = d.rede.total ? Math.round(d.rede.online / d.rede.total * 100) : 0;
    document.getElementById('online-perc').textContent = `${p}% do laboratório`;
    document.getElementById('offline-perc').textContent = `${100 - p}% do laboratório`;

    const banner = document.getElementById('prova-banner-container');
    banner.innerHTML = d.modo_prova.ativo
      ? `<div class="prova-banner">🔒 MODO PROVA ATIVO — desde ${d.modo_prova.desde}</div>`
      : '';

    document.getElementById('last-update').textContent = `Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;
  } catch (e) { console.error(e); }
}
refresh(); setInterval(refresh, 30000);
</script>
</body>
</html>
