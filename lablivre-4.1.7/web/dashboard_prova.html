<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LabLivre — Modo Prova</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red-deep: #7f1d1d;
  --red: #dc2626;
  --red-light: #ef4444;
  --black: #0c0a09;
  --white: #fef2f2;
}
body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--black);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}
/* Faixas vermelhas diagonais de fundo */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent 0px,
    transparent 60px,
    rgba(220, 38, 38, 0.08) 60px,
    rgba(220, 38, 38, 0.08) 90px
  );
  z-index: 0;
  pointer-events: none;
}
.container { max-width: 1400px; margin: 0 auto; padding: 40px; position: relative; z-index: 1; }

/* Status — quando modo prova INATIVO */
.inactive-state {
  text-align: center;
  padding: 80px 40px;
  border: 3px dashed rgba(254, 242, 242, 0.2);
  border-radius: 12px;
  color: rgba(254, 242, 242, 0.4);
}
.inactive-state h2 { font-family: 'Oswald', sans-serif; font-size: 48px; font-weight: 500; }

/* Estado ATIVO */
.active-banner {
  background: var(--red);
  padding: 60px 40px;
  text-align: center;
  margin-bottom: 30px;
  border: 4px solid var(--white);
  box-shadow: 0 0 0 8px var(--red), 0 0 100px rgba(220, 38, 38, 0.6);
  position: relative;
}
.active-banner h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 96px;
  font-weight: 700;
  letter-spacing: 0.08em;
  line-height: 1;
}
.active-banner .lock-icon { font-size: 64px; margin-bottom: 16px; display: block; }
.active-banner .since {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px;
  margin-top: 16px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.live-strip {
  background: var(--white);
  color: var(--red-deep);
  padding: 12px 0;
  text-align: center;
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  letter-spacing: 0.3em;
  font-size: 14px;
  margin-bottom: 30px;
  text-transform: uppercase;
}
.info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
.info-card {
  background: rgba(127, 29, 29, 0.4);
  border: 2px solid var(--red);
  padding: 24px;
  border-radius: 4px;
}
.info-card .label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  color: var(--red-light);
  margin-bottom: 12px;
  font-weight: 600;
}
.info-card .value {
  font-family: 'Oswald', sans-serif;
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
}
.info-card .detail {
  font-size: 13px;
  color: rgba(254, 242, 242, 0.6);
  margin-top: 8px;
}

.rules-section {
  background: rgba(0,0,0,0.5);
  border: 2px solid var(--red);
  padding: 30px;
  margin-bottom: 30px;
}
.rules-section h3 {
  font-family: 'Oswald', sans-serif;
  font-size: 24px;
  margin-bottom: 16px;
  letter-spacing: 0.05em;
  color: var(--red-light);
}
.rules-section ul { list-style: none; }
.rules-section li {
  padding: 8px 0 8px 32px;
  position: relative;
  font-size: 15px;
  line-height: 1.6;
}
.rules-section li::before {
  content: '✕';
  position: absolute;
  left: 0;
  color: var(--red-light);
  font-weight: bold;
  font-size: 20px;
}
.rules-section li.allowed::before { content: '✓'; color: #4ade80; }

footer {
  text-align: center;
  font-size: 11px;
  color: rgba(254, 242, 242, 0.4);
  letter-spacing: 0.3em;
  text-transform: uppercase;
  margin-top: 40px;
}
@keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
.live-strip { animation: flash 1.5s infinite; }
</style>
</head>
<body>
<div class="container">
  <div id="content">
    <div class="inactive-state">
      <h2>Carregando…</h2>
    </div>
  </div>
</div>

<script>
async function refresh() {
  try {
    const r = await fetch('api.json?t=' + Date.now());
    const d = await r.json();
    const root = document.getElementById('content');

    if (!d.modo_prova.ativo) {
      root.innerHTML = `
        <div class="inactive-state">
          <h2>🟢 MODO PROVA INATIVO</h2>
          <p style="margin-top:16px; font-size:14px;">Internet liberada · Laboratório em operação normal</p>
          <p style="margin-top:32px; font-family: 'IBM Plex Mono'; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;">${d.lab.nome} · ${d.rede.online} de ${d.rede.total} máquinas online</p>
        </div>`;
      return;
    }

    const p = d.rede.total ? Math.round(d.rede.online / d.rede.total * 100) : 0;
    root.innerHTML = `
      <div class="live-strip">⚠ AVALIAÇÃO EM ANDAMENTO · MONITORAMENTO ATIVO · ${d.lab.nome.toUpperCase()} ⚠</div>

      <div class="active-banner">
        <span class="lock-icon">🔒</span>
        <h1>MODO PROVA</h1>
        <div class="since">ATIVO DESDE ${d.modo_prova.desde}</div>
      </div>

      <div class="info-grid">
        <div class="info-card">
          <div class="label">Máquinas Monitoradas</div>
          <div class="value">${d.rede.online}</div>
          <div class="detail">de ${d.rede.total} no laboratório (${p}%)</div>
        </div>
        <div class="info-card">
          <div class="label">Indisponíveis</div>
          <div class="value">${d.rede.offline}</div>
          <div class="detail">sem acesso ao firewall</div>
        </div>
        <div class="info-card">
          <div class="label">Rede</div>
          <div class="value" style="font-size:20px; line-height:1.4;">${d.rede.sub_rede || '—'}</div>
          <div class="detail">${d.rede.interface || '—'}</div>
        </div>
      </div>

      <div class="rules-section">
        <h3>REGRAS APLICADAS NAS ESTAÇÕES</h3>
        <ul>
          <li>Acesso à internet pública (HTTP/HTTPS externo)</li>
          <li>Navegação fora da rede do campus</li>
          <li>Serviços de IA (ChatGPT, Claude, Gemini, etc.)</li>
          <li>Mensageiros (WhatsApp Web, Telegram, Discord)</li>
          <li class="allowed">Rede local (intranet 10.x / 192.168.x)</li>
          <li class="allowed">Comunicação com o professor (SSH)</li>
        </ul>
      </div>

      <footer>Última verificação: ${new Date().toLocaleTimeString('pt-BR')} · auto-refresh 30s</footer>
    `;
  } catch (e) {
    document.getElementById('content').innerHTML = '<div class="inactive-state"><h2>Erro ao carregar estado</h2></div>';
  }
}
refresh(); setInterval(refresh, 30000);
</script>
</body>
</html>
