<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LabLivre — Auditoria</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#0a0a0f; --card:#14141d; --border:rgba(255,255,255,0.08); --text:#f5f5f7; --dim:#8b8b9b; --green:#10b981; --red:#ef4444; --amber:#f59e0b; --indigo:#6366f1; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); padding:40px 24px; min-height:100vh; }
.container { max-width:1200px; margin:0 auto; }
header { margin-bottom:32px; display:flex; justify-content:space-between; align-items:baseline; }
h1 { font-size:32px; font-weight:700; letter-spacing:-0.02em; }
.subtitle { color:var(--dim); font-size:14px; margin-top:4px; }
.filters { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
.filter-btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; font-family:inherit; transition:all 0.2s; }
.filter-btn:hover { border-color:var(--indigo); }
.filter-btn.active { background:var(--indigo); border-color:var(--indigo); }
.timeline { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.entry { padding:16px 24px; border-bottom:1px solid var(--border); display:grid; grid-template-columns:140px 1fr auto; gap:20px; align-items:center; transition:background 0.2s; }
.entry:last-child { border-bottom:none; }
.entry:hover { background:rgba(99,102,241,0.05); }
.entry-time { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); }
.entry-action { font-weight:500; }
.entry-action .badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-right:8px; }
.badge.modo_prova_ativar { background:rgba(239,68,68,0.15); color:var(--red); }
.badge.modo_prova_desativar { background:rgba(16,185,129,0.15); color:var(--green); }
.badge.ligar_lab,.badge.desligar_lab { background:rgba(245,158,11,0.15); color:var(--amber); }
.badge.distribuir_material { background:rgba(99,102,241,0.15); color:var(--indigo); }
.badge.manutencao_sistema,.badge.corrigir_quebrados { background:rgba(139,92,246,0.15); color:#a78bfa; }
.badge.coletar_inventario { background:rgba(34,197,94,0.15); color:#4ade80; }
.entry-detail { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); margin-top:4px; }
.entry-user { font-size:12px; color:var(--dim); font-family:'JetBrains Mono',monospace; }
.empty { padding:60px; text-align:center; color:var(--dim); }
footer { text-align:center; margin-top:24px; color:var(--dim); font-size:12px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div><h1>📜 Auditoria</h1><div class="subtitle">Registro estruturado de ações do orquestrador</div></div>
    <a href="index.html" style="color:var(--dim); text-decoration:none; font-size:13px;">← Voltar ao portal</a>
  </header>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Todas</button>
    <button class="filter-btn" data-filter="modo_prova">Modo Prova</button>
    <button class="filter-btn" data-filter="ligar_lab">Energia</button>
    <button class="filter-btn" data-filter="manutencao">Manutenção</button>
    <button class="filter-btn" data-filter="distribuir">Material</button>
    <button class="filter-btn" data-filter="inventario">Inventário</button>
  </div>

  <div class="timeline" id="timeline"><div class="empty">Carregando…</div></div>
  <footer id="footer">Auto-refresh 30s · API: auditoria.json</footer>
</div>

<script>
let entradas = [];
let filtroAtivo = 'all';

async function carregar() {
  try {
    const r = await fetch('auditoria.json?t=' + Date.now());
    entradas = await r.json();
    render();
    document.getElementById('footer').textContent = `${entradas.length} eventos · Atualizado às ${new Date().toLocaleTimeString('pt-BR')}`;
  } catch (e) {
    document.getElementById('timeline').innerHTML = '<div class="empty">Nenhuma auditoria registrada ainda.<br><small>Use o menu para executar ações e elas aparecerão aqui.</small></div>';
  }
}

function render() {
  const filtradas = entradas.filter(e => {
    if (filtroAtivo === 'all') return true;
    if (filtroAtivo === 'ligar_lab') return e.acao.includes('ligar') || e.acao.includes('desligar');
    if (filtroAtivo === 'modo_prova') return e.acao.startsWith('modo_prova');
    return e.acao.includes(filtroAtivo);
  });

  const tl = document.getElementById('timeline');
  if (filtradas.length === 0) {
    tl.innerHTML = '<div class="empty">Nenhum evento neste filtro.</div>';
    return;
  }

  tl.innerHTML = filtradas.map(e => {
    const ts = e.ts ? e.ts.substring(0,19).replace('T',' ') : '?';
    const det = e.detalhes && Object.keys(e.detalhes).length
      ? Object.entries(e.detalhes).map(([k,v]) => `${k}=${v}`).join(' · ')
      : '';
    return `
      <div class="entry">
        <div class="entry-time">${ts}</div>
        <div>
          <div class="entry-action"><span class="badge ${e.acao}">${e.acao.replace(/_/g,' ')}</span></div>
          ${det ? `<div class="entry-detail">${det}</div>` : ''}
        </div>
        <div class="entry-user">${e.usuario}@${e.host}</div>
      </div>`;
  }).join('');
}

document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filtroAtivo = b.dataset.filter;
    render();
  });
});

carregar(); setInterval(carregar, 30000);
</script>
</body>
</html>
