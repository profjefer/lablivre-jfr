<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>LabLivre — Painel Operacional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fafaf9;
  --card: #ffffff;
  --text: #1c1917;
  --text-dim: #78716c;
  --border: #e7e5e4;
  --green: #16a34a;
  --red: #dc2626;
  --amber: #d97706;
  --accent: #1e40af;
}
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 32px;
  min-height: 100vh;
}
.container { max-width: 1400px; margin: 0 auto; }
header { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
.subtitle { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
.live-indicator { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
.live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 32px; }
.stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; transition: border-color 0.2s; }
.stat-card:hover { border-color: var(--text-dim); }
.stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 8px; }
.stat-value { font-size: 36px; font-weight: 700; letter-spacing: -0.03em; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-detail { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
.alerts { margin-bottom: 24px; }
.alert { padding: 14px 18px; border-radius: 6px; font-size: 14px; display: flex; align-items: center; gap: 12px; }
.alert.alert-prova { background: #fef2f2; border-left: 4px solid var(--red); color: var(--red); }
.alert.alert-ok { background: #f0fdf4; border-left: 4px solid var(--green); color: var(--green); }
.section-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); margin-bottom: 12px; }
.machines-table { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th, td { text-align: left; padding: 12px 18px; font-size: 14px; }
th { background: #f5f5f4; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); border-bottom: 1px solid var(--border); }
tr { border-bottom: 1px solid var(--border); }
tr:last-child { border-bottom: none; }
.status-pill { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; font-family: 'JetBrains Mono', monospace; }
.status-pill.online { background: #dcfce7; color: var(--green); }
.status-pill.offline { background: #fef2f2; color: var(--red); }
.machine-name { font-weight: 500; }
.machine-name.is-this::after { content: "(esta máquina)"; margin-left: 8px; font-size: 11px; color: var(--accent); font-weight: 400; }
.mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text-dim); }
footer { margin-top: 32px; text-align: center; color: var(--text-dim); font-size: 12px; font-family: 'JetBrains Mono', monospace; }
.error { background: var(--card); border: 1px solid var(--red); padding: 20px; border-radius: 8px; color: var(--red); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1 id="lab-nome">Carregando…</h1>
      <div class="subtitle" id="lab-subtitle"></div>
    </div>
    <div class="live-indicator">
      <span class="live-dot"></span>
      <span>Atualização automática a cada 30s</span>
    </div>
  </header>

  <div id="alerts" class="alerts"></div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total de Máquinas</div>
      <div class="stat-value" id="total">—</div>
      <div class="stat-detail" id="rede-info"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Online</div>
      <div class="stat-value green" id="online">—</div>
      <div class="stat-detail" id="online-perc"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Offline</div>
      <div class="stat-value red" id="offline">—</div>
      <div class="stat-detail" id="offline-perc"></div>
    </div>
  </div>

  <div class="section-title">Estações de Trabalho</div>
  <div class="machines-table">
    <table>
      <thead>
        <tr><th>Nome</th><th>MAC</th><th>IP</th><th>Status</th></tr>
      </thead>
      <tbody id="machines-tbody">
        <tr><td colspan="4" style="text-align:center; padding: 40px; color: var(--text-dim);">Carregando…</td></tr>
      </tbody>
    </table>
  </div>

  <footer id="footer">Aguardando primeiro carregamento…</footer>
</div>

<script>
async function refresh() {
  try {
    const r = await fetch('api.json?t=' + Date.now());
    if (!r.ok) throw new Error('Sem api.json');
    const d = await r.json();

    document.getElementById('lab-nome').textContent = d.lab.nome;
    document.getElementById('lab-subtitle').textContent = `IPs atualizados em ${d.lab.ips_atualizado_em}`;

    document.getElementById('total').textContent = d.rede.total;
    document.getElementById('online').textContent = d.rede.online;
    document.getElementById('offline').textContent = d.rede.offline;

    const perc = d.rede.total ? Math.round(d.rede.online / d.rede.total * 100) : 0;
    document.getElementById('online-perc').textContent = `${perc}% disponível`;
    document.getElementById('offline-perc').textContent = `${100 - perc}% indisponível`;
    document.getElementById('rede-info').textContent = `${d.rede.interface || '—'} · ${d.rede.sub_rede || '—'}`;

    const alerts = document.getElementById('alerts');
    if (d.modo_prova.ativo) {
      alerts.innerHTML = `<div class="alert alert-prova">🔒 <strong>MODO PROVA ATIVO</strong> &nbsp;·&nbsp; Iniciado em ${d.modo_prova.desde} &nbsp;·&nbsp; Internet bloqueada nas máquinas dos alunos</div>`;
    } else {
      alerts.innerHTML = `<div class="alert alert-ok">✓ Operação normal &nbsp;·&nbsp; Internet liberada</div>`;
    }

    const tbody = document.getElementById('machines-tbody');
    if (d.maquinas.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding: 40px; color: var(--text-dim);">Nenhuma máquina no inventário</td></tr>';
    } else {
      tbody.innerHTML = d.maquinas.map(m => `
        <tr>
          <td><span class="machine-name ${m.esta_maquina ? 'is-this' : ''}">${m.nome}</span></td>
          <td class="mono">${m.mac}</td>
          <td class="mono">${m.ip}</td>
          <td><span class="status-pill ${m.status}">${m.status}</span></td>
        </tr>
      `).join('');
    }

    document.getElementById('footer').textContent = `Última atualização: ${new Date().toLocaleTimeString('pt-BR')} · Próxima em 30s`;
  } catch (e) {
    document.getElementById('alerts').innerHTML = `<div class="error">Erro ao carregar api.json. Execute "Atualizar IPs" no menu para gerar o arquivo de estado.</div>`;
    console.error(e);
  }
}
refresh();
setInterval(refresh, 30000);
</script>
</body>
</html>
